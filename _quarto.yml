project:
  type: website

website:
  title: survey-lexical-decision
  navbar:
    search: true
  search:
    copy-button: true
  reader-mode: true

editor:
  render-on-save: true

bibliography: survey-lexical-decision.bib

html-math-method: katex
csl: https://raw.githubusercontent.com/citation-style-language/styles/master/apa.csl

execute:
  freeze: true
  cache: true

format:
  html:
    theme: 
      light: cosmo
      dark: solar # choose: darkly cyborg slate solar superhero vapor
    # mainfont: CMU Concrete
    fontsize: 12pt
    # linestretch: 1.25
    citations-hover: true
    footnotes-hover: true
    toc: true
    toc-title: "Contents"
    reference-location: margin
    default-image-extension: png
    css: assets/collapsible-sections.css
    include-after-body: assets/collapsible-sections.js
    include-before: |
      <div class="hidden">
      <p><span class="math display">
      \global\def\bbone{𝟙}
      \global\def\I#1{\operatorname{I}(#1)}
      \global\def\H#1{\operatorname{H}(#1)}
      \global\def\surp#1{\operatorname{surp}(#1)}
      \global\def\DIV#1#2#3#4{\operatorname{D_{#1}}(#3#2#4)}
      \global\def\KL#1#2{\DIV{KL}\|{#1}{#2}}
      \global\def\EE{\operatorname*{\mathbb{E}}}
      \global\def\var#1{\operatorname{\mathbb{V}}(#1)}
      \global\def\Var#1#2{\operatorname{\mathbb{V}}\!\!{}_{#1}(#2)}
      </span></p>
      </div>